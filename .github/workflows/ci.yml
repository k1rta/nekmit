name: CI E2E and Report

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: "reports-${{ github.ref || github.run_id }}"
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: playwright
        run: npm run test:e2e
        continue-on-error: true
      
      - name: Check test results
        id: test-status
        run: |
          if [ -f playwright-report/index.html ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      # Store test results as artifacts
      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 30

      # Deploy to GitHub Pages (all branches, with proper Vercel ignore)
      - name: Deploy test report to GitHub Pages
        if: always()
        run: |
          # Create a proper static site structure
          mkdir -p gh-pages-deploy
          cp -r playwright-report/* gh-pages-deploy/ 2>/dev/null || echo "No test report to copy"
          
          # Add .nojekyll for GitHub Pages
          touch gh-pages-deploy/.nojekyll
          
          # Add vercel.json to tell Vercel to skip this directory
          cat > gh-pages-deploy/vercel.json << 'EOF'
          {
            "builds": []
          }
          EOF

      - name: Publish to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-deploy
          publish_branch: gh-pages
          destination_dir: reports/${{ github.head_ref || github.ref_name }}
          keep_files: true

      # Comment on PR with test results
      - name: Comment PR with test status
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testStatus = '${{ steps.test-status.outputs.status }}';
            const branch = '${{ github.head_ref || github.ref_name }}';
            const runId = '${{ github.run_id }}';
            const sha = '${{ github.sha }}'.substring(0, 7);
            const timestamp = new Date().toISOString();
            
            let message = '## 🧪 Test Results\n\n';
            
            if (testStatus === 'success') {
              message += '✅ Tests completed\n\n';
            } else {
              message += '❌ Tests failed or no report generated\n\n';
            }
            
            message += `📊 **View Reports:**\n`;
            message += `- [Test Report on GitHub Pages](https://k1rta.github.io/nekmit/reports/${branch}/?run=${runId})\n`;
            message += `- [Download Artifacts](https://github.com/${{ github.repository }}/actions/runs/${runId})\n`;
            message += `- [Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${runId})\n\n`;
            message += `**Commit:** \`${sha}\` | **Updated:** ${timestamp}`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => 
              c.user.type === 'Bot' && 
              c.body && 
              c.body.includes('🧪 Test Results')
            );
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: message
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: message
              });
            }
