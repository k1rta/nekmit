name: CI E2E and Report

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: "reports-${{ github.ref || github.run_id }}"
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: error

      - name: Add vercel.json to reports (skip Vercel build on gh-pages)
        run: |
          cat > playwright-report/vercel.json << 'EOF'
          {
            "ignoreCommand": "echo 'Skipping Vercel build for gh-pages reports' && exit 0"
          }
          EOF

      - name: Prepare gh-pages root config (vercel.json + .nojekyll)
        if: github.ref_name != 'gh-pages'
        run: |
          mkdir -p ghpages-root
          cat > ghpages-root/vercel.json << 'EOF'
          {
            "ignoreCommand": "echo 'Skipping Vercel build for gh-pages branch' && exit 0"
          }
          EOF
          touch ghpages-root/.nojekyll

      - name: Publish gh-pages root config
        if: github.ref_name != 'gh-pages'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ghpages-root
          publish_branch: gh-pages
          destination_dir: .
          keep_files: true
          force_orphan: true

      - name: Publish HTML report to gh-pages (per-branch path)
        if: github.ref_name != 'gh-pages'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          publish_branch: gh-pages
          destination_dir: reports/${{ github.ref_name }}/latest
          keep_files: true
          force_orphan: true

      - name: Publish HTML report to gh-pages (canonical main path)
        if: github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          publish_branch: gh-pages
          destination_dir: reports/main/latest
          keep_files: true
          force_orphan: true

      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // Derive the actual branch name for PR events
            const branch = '${{ github.head_ref || github.ref_name }}';
            const url = `https://k1rta.github.io/nekmit/reports/${branch}/latest/`;
            const body = `🧪 Playwright report for this branch: ${url}`;
            // Skip commenting for PRs from forks (token has limited perms)
            if (context.payload.pull_request && context.payload.pull_request.head.repo.fork) {
              core.info('PR is from a fork; skipping comment due to limited permissions.');
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes('Playwright report for this branch'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
