<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g opacity="0.08" stroke="#93c5fd" stroke-width="1">
    <defs>
      <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
        <path d="M 48 0 L 0 0 0 48" fill="none"/>
      </pattern>
    </defs>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  <!-- text -->
  <g fill="#e6faff">
    <text x="80" y="300" font-family="'Inter', Arial, sans-serif" font-size="64" font-weight="800" fill="url(#accent)">Kirta‑Linda Karits</text>
    <text x="80" y="380" font-family="'JetBrains Mono', monospace" font-size="28" fill="#a5f3fc">
      Cloud‑native DevOps + modern Frontend • Strong QA background
    </text>
  </g>
  <!-- accent bar -->
  <rect x="80" y="420" width="320" height="6" rx="3" fill="url(#accent)"/>
</svg>
