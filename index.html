  <script async>
    window.onload = function () {
      document.body.classList.remove('is-preload')
    }
    window.ontouchmove = function () {
      return false
    }
    window.onorientationchange = function () {
      document.body.scrollTop = 0
    }

    // Detect if running on localhost or production
    const isLocalhost = window.location.hostname.includes('localhost')

    // Use the correct API URL
    const apiUrl = isLocalhost
      ? 'http://localhost:3000/api/page_view' // Local development
      : 'https://nekmit.onrender.com/api/page_view' // Production API on Render

    // Send page view data
    fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        page: window.location.pathname,
        environment: isLocalhost ? 'localhost' : 'production',
        timestamp: new Date().toISOString(), // Adds a timestamp in ISO format
      }),
    })
      .then((response) => response.json())
      .catch((error) => {})

    // Track icon clicks
    document.addEventListener('DOMContentLoaded', function () {
      const clickApiUrl = isLocalhost
        ? 'http://localhost:3000/api/icon_click'
        : 'https://nekmit.onrender.com/api/icon_click'

      document.querySelectorAll('nav ul li a').forEach((icon) => {
        icon.addEventListener('click', function (event) {
          const iconName = this.getAttribute('data-cy') // Extract icon name from data-cy attribute

          fetch(clickApiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              icon: iconName,
              environment: isLocalhost ? 'localhost' : 'production',
              timestamp: new Date().toISOString(),
            }),
          })
            .then((response) => response.json())
            .catch((error) => console.error('Error logging icon click:', error))
        })
      })
    })
  </script>
